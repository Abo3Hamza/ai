<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة التطبيقات 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            /* خلفية متدرجة عصرية */
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* التأثير الزجاجي للكروت */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* تأثير الدخول المتدرج */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        /* دوائر مضيئة في الخلفية للمظهر الجمالي */
        .bg-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.4;
        }
    </style>
</head>
<body class="relative py-12 px-4 sm:px-8">

    <div class="bg-glow w-96 h-96 bg-blue-600/30 top-0 left-0"></div>
    <div class="bg-glow w-96 h-96 bg-purple-600/30 bottom-0 right-0"></div>

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-16 animate-fade-in" style="animation-delay: 100ms;">
            <h1 class="text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-tight mb-4 drop-shadow-lg">
                بوابة التطبيقات
            </h1>
            <p class="text-slate-400 text-lg">مجموعة المشاريع والتطبيقات الخاصة بك في مكان واحد</p>
        </header>

        <div id="apps-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8">
            </div>
    </div>

    <script>
        // ==========================================
        // 📁 قائمة أسماء الفولدرات (التطبيقات)
        // أضف أسماء الفولدرات الخاصة بك هنا
        // ==========================================
        const folders = [
            "breakout",
            "gomoku",
            "snake"
        ];

        const gridContainer = document.getElementById('apps-grid');

        // بناء الكروت ديناميكياً
        folders.forEach((folderName, index) => {
            // حساب التأخير في الأنيميشن لكل كرت ليظهروا بتتابع جميل
            const delay = (index + 2) * 100; 

            // مسار الأيقونة كما طلبت
            const iconPath = `./${folderName}/icons/icon-192x192.png`;
            // أيقونة بديلة في حالة عدم وجود الصورة (تأخذ أول حرفين من اسم الفولدر)
            const fallbackIcon = `https://ui-avatars.com/api/?name=${folderName}&background=1e293b&color=38bdf8&size=192&font-size=0.4&bold=true`;

            // إنشاء عنصر الرابط (الكرت)
            const card = document.createElement('a');
            card.href = `./${folderName}/`;
            card.className = `glass-card rounded-3xl p-6 flex flex-col items-center justify-center gap-5 group cursor-pointer animate-fade-in transition-all duration-300 hover:bg-white/5 hover:border-blue-500/30`;
            card.style.animationDelay = `${delay}ms`;

            // محتوى الكرت (الصورة + الاسم)
            card.innerHTML = `
                <div class="relative w-28 h-28 rounded-2xl overflow-hidden shadow-xl transition-all duration-500 group-hover:-translate-y-3 group-hover:scale-110 group-hover:shadow-blue-500/40 border border-slate-700/50 group-hover:border-blue-400/50">
                    <img 
                        src="${iconPath}" 
                        alt="${folderName}" 
                        class="w-full h-full object-cover bg-slate-800 transition-transform duration-500"
                        onerror="this.onerror=null; this.src='${fallbackIcon}';"
                    />
                </div>
                <h3 class="text-slate-200 font-bold text-lg text-center tracking-wide group-hover:text-cyan-400 transition-colors duration-300">
                    ${folderName}
                </h3>
            `;

            // إضافة الكرت للشبكة
            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
